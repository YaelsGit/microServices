services:
  mssql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mechira-mssql-db
    user: root
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPasswordHere123!"
      MSSQL_PID: "Developer"
    volumes:
      - mssql-data:/var/opt/mssql/data
      - mssql-log:/var/opt/mssql/log
      - mssql-backup:/var/opt/mssql/backup
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourPasswordHere123!' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      
  seq:
    image: datalust/seq:latest
    container_name: seq-logs
    ports:
      - "8081:80"
      - "5341:5341"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  auth-service:
    build: { context: ., dockerfile: Services/AuthService/Dockerfile }
    container_name: mechira-auth-service
    ports: ["5001:5001"]
    environment:
      ASPNETCORE_URLS: http://+:5001
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-AuthService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
    depends_on:
      mssql-db: { condition: service_healthy }
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  mongodb:
    image: mongo:7.0
    container_name: mechira-mongodb
    ports: ["27017:27017"]
    volumes: [mongodb-data:/data/db]
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  catalog-service-1:
    build: { context: ., dockerfile: Services/CatalogService/Dockerfile }
    container_name: mechira-catalog-service-1
    environment:
      ASPNETCORE_URLS: http://+:5002
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-CatalogService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
    depends_on:
      mssql-db: { condition: service_healthy }
      mongodb: { condition: service_healthy }
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  rabbitmq-service:
    image: rabbitmq:3.13-management
    container_name: mechira-rabbitmq
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-cache:
    image: redis:7-alpine
    container_name: mechira-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  mechira-network:
    driver: bridge

volumes:
  mssql-data:
  mssql-log:
  mssql-backup:
  rabbitmq-data:
  mongodb-data:
  redis-data:
  seq-data: