upstream catalog_upstream {
    # Round-robin load balancing across 2 catalog-service replicas
    server catalog-service-1:5002;
    server catalog-service-2:5002;
}

server {
    listen 5002;

    location / {
        proxy_pass http://catalog_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Add upstream address header so client can see which replica served the request
        add_header X-Upstream-Server $upstream_addr always;
    }
}
